name: Run ETF Update

on:
  workflow_dispatch:  # permette di avviare manualmente
  schedule:
    - cron: '0 18 * * 1-5' # es. tutti i giorni feriali alle 18:00 UTC

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
  uses: actions/checkout@v4

- name: Set up Python
  uses: actions/setup-python@v5
  with:
    python-version: '3.11'


      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gspread oauth2client requests beautifulsoup4

      - name: Run ETF script
        env:
          SERVICE_ACCOUNT_FILE: python_script/etf-portfolio-123456.json
        run: |
          python python_script/investing_etf_update.py
