name: Run ETF Script

# Permette sia esecuzione programmata sia manuale
on:
  workflow_dispatch:   # permette avvio manuale
  schedule:
    - cron: '30 18 * * 1-5'  # ogni giorno alle 18:30 dal lunedì al venerdì (UTC!)

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Scarica il contenuto della repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'  # puoi cambiare versione se vuoi

      # 3️⃣ Installa le dipendenze necessarie
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gspread oauth2client requests beautifulsoup4

      # 4️⃣ Esegui lo script
      - name: Run ETF Python script
        run: |
          python python_script/investing_etf_update.py
