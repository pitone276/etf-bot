name: ETF BOT

on:
  schedule:
    - cron: '30 17 * * 1-5'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install gspread oauth2client requests beautifulsoup4

    - name: Run script
      run: python investing_etf_update.py
