name: ETF Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "30 17 * * 1-5"   # 17:30 UTC = 18:30 Italia, lun-ven

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ETF script
        run: python investing_etf_update.py

      - name: Commit CSV
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add etf_data.csv
          git commit -m "Update ETF CSV" || echo "Nessun cambiamento da committare"
          git push
