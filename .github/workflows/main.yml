name: Run ETF Script

on:
  schedule:
    - cron: '30 18 * * 1-5'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      # Clona la repo
      - uses: actions/checkout@v3

      # Imposta Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      # Installa dipendenze
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gspread oauth2client requests beautifulsoup4

      # Esegui lo script
      - name: Run ETF script
        run: python python_script/investing_etf_update.py
        env:
          SERVICE_ACCOUNT_FILE: python_script/etf-portfolio-123456.json
